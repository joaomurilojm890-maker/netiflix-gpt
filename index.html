<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MovieTalk</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">Movie<span>Talk</span></div>

    <form id="searchForm" class="search-form">
      <input
        id="searchInput"
        type="text"
        placeholder="Buscar filme..."
        autocomplete="off"
      />
      <button type="submit">Buscar</button>
    </form>
  </header>

  <section class="hero">
    <div class="hero-content">
      <p class="badge">catálogo + avaliações + conversa</p>
      <h1>Uma página simples no estilo Netflix</h1>
      <p>
        Veja os filmes, abra as avaliações e converse sobre cada título sem expor a chave da API no frontend.
      </p>
    </div>
  </section>

  <main class="container">
    <h2 class="section-title">Catálogo</h2>
    <div id="moviesGrid" class="movies-grid"></div>
  </main>

  <aside id="drawer" class="drawer">
    <div class="drawer-header">
      <h3>Detalhes do filme</h3>
      <button id="closeDrawer" class="close-btn">×</button>
    </div>

    <div class="drawer-content">
      <div id="selectedMovieInfo"></div>

      <section class="reviews-box">
        <h4>Avaliações</h4>
        <div id="reviewsList"></div>
      </section>

      <section class="chat-box">
        <h4>Conversar sobre o filme</h4>
        <div id="chatMessages" class="chat-messages"></div>

        <div class="chat-input-area">
          <input
            id="chatInput"
            type="text"
            placeholder="Ex.: vale a pena assistir?"
          />
          <button id="sendChatBtn">Enviar</button>
        </div>
      </section>
    </div>
  </aside>

  <script src="./script.js"></script>
</body>
</html>
