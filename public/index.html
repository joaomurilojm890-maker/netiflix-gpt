<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chat IA Filmes</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎬 Chat IA de Filmes</h1>

<div class="ia-selector">
  <button onclick="setModo('gemini')">🧠 Gemini</button>
  <button onclick="setModo('gpt')">🤖 GPT</button>
  <button onclick="setModo('debate')">⚔️ Debate IA vs IA</button>
</div>

<div class="chat-box">

  <div id="chatMessages" class="chat-messages"></div>

  <input id="chatInput" placeholder="Pergunte algo sobre filmes">
  <button id="sendBtn">Enviar</button>

</div>

<script src="script.js"></script>

</body>
</html>
