<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Netflix Chat</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">NET<span>FLIX</span></div>
</header>

<section class="hero">
  <h1>Chat de Filmes 🎬</h1>
  <p>Pergunte qualquer coisa sobre filmes</p>
</section>

<div class="chat-box">

  <div id="chatMessages" class="chat-messages"></div>

  <div class="chat-input-area">
    <input id="chatInput" placeholder="Ex: filmes de ação">
    <button id="sendBtn">Enviar</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
